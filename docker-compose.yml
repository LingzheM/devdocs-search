services:
  typesense:
    image: typesense/typesense:27.1
    container_name: typesense
    ports:
      - "8108:8108"
    volumes:
      - typesense-data:/data
    command: >
      --data-dir /data
      --api-key=dev_api_key_123
      --enable-cors
    restart: unless-stopped

volumes:
  typesense-data:
